<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chi tiết code – CodeHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .slider-container { position: relative; margin: 20px 0; }
        .demo-slider { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 20px; padding: 16px 0; scroll-snap-type: x mandatory; }
        .demo-slider img { max-width: 280px; border-radius: 20px; scroll-snap-align: start; border: 1px solid var(--border); }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: var(--bg-card); border: 1px solid var(--border); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .slider-left { left: -10px; } .slider-right { right: -10px; }
        .action-buttons { display: flex; gap: 16px; flex-wrap: wrap; margin: 28px 0; }
        .btn { padding: 12px 28px; border-radius: 60px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: none; }
        .download-btn { background: var(--accent); color: #000; }
        .favorite-btn { background: var(--bg-card); border: 1px solid var(--border); color: #ff6b6b; }
        .favorite-btn.active { background: #ff6b6b; color: white; }
        .error-box { background: #2a1a1a; border-left: 4px solid #ff6666; padding: 16px; margin: 20px 0; border-radius: 16px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e1e2a; border: 1px solid var(--accent); padding: 12px 24px; border-radius: 60px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000; }
        .toast.show { opacity: 1; }
        @media (max-width: 600px) { .demo-slider img { max-width: 220px; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-code"></i> Code<span class="highlight">Hub</span></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </header>
    <main class="container" style="max-width: 1000px;">
        <div id="productContent"><div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Đang tải...</div></div>
    </main>
    <footer class="footer"><p>© 2025 CodeHub</p></footer>
    <div id="toast" class="toast"></div>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module">
        import { auth, db, doc, getDoc, setDoc, updateDoc, increment, collection, addDoc, query, where, getDocs, deleteDoc, onAuthStateChanged } from './js/firebase-config.js';
        const el = document.getElementById('productContent');
        const toast = document.getElementById('toast');
        const productId = new URLSearchParams(location.search).get('id');
        let product = null, currentUser = null;

        function showToast(msg, isErr) { toast.textContent = msg; toast.style.borderColor = isErr ? '#ff6666' : 'var(--accent)'; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'), 2500); }
        function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])) : ''; }
        function formatNotes(notes) { return escapeHtml(notes || 'Không có ghi chú.').replace(/\n/g, '<br>'); }

        async function fetchProduct() {
            try {
                const res = await fetch('data/products.json');
                const data = await res.json();
                product = data.find(p => p.id === productId);
                if (!product) throw new Error();
                return true;
            } catch {
                el.innerHTML = '<div style="text-align:center;padding:40px;">Không tìm thấy sản phẩm</div>';
                return false;
            }
        }
        async function incrementView() {
            const ref = doc(db, 'stats', product.id);
            try { await updateDoc(ref, { views: increment(1) }); } catch { await setDoc(ref, { views: 1, downloads: 0 }); }
        }
        async function getStats() {
            try { const snap = await getDoc(doc(db, 'stats', product.id)); return snap.exists() ? snap.data() : { views: 0, downloads: 0 }; } catch { return { views: 0, downloads: 0 }; }
        }
        async function isFavorite() {
            if (!currentUser) return false;
            const q = query(collection(db, 'favorites'), where('userId','==',currentUser.uid), where('productId','==',product.id));
            const snap = await getDocs(q);
            return !snap.empty;
        }
        async function toggleFavorite(btn) {
            if (!currentUser) { showToast('Đăng nhập để yêu thích', true); return; }
            const fav = await isFavorite();
            const q = query(collection(db, 'favorites'), where('userId','==',currentUser.uid), where('productId','==',product.id));
            const snap = await getDocs(q);
            if (fav) {
                snap.forEach(d => deleteDoc(d.ref));
                btn.classList.remove('active');
                btn.innerHTML = '<i class="far fa-heart"></i> Yêu thích';
                showToast('Đã xóa yêu thích');
            } else {
                await addDoc(collection(db, 'favorites'), { userId: currentUser.uid, productId: product.id, favoritedAt: new Date() });
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-heart"></i> Đã thích';
                showToast('Đã thêm yêu thích');
            }
        }
        async function recordDownload() {
            const ref = doc(db, 'stats', product.id);
            await updateDoc(ref, { downloads: increment(1) }).catch(() => setDoc(ref, { views: 0, downloads: 1 }));
            if (currentUser) await addDoc(collection(db, 'download_history'), { userId: currentUser.uid, productId: product.id, productName: product.name, downloadLink: product.downloadLink, downloadedAt: new Date() });
            showToast('Đang chuyển đến Mediafire...');
            window.open(product.downloadLink, '_blank');
        }
        async function reportIssue() {
            if (!currentUser) { showToast('Đăng nhập để báo lỗi', true); return; }
            const issue = prompt('Mô tả lỗi bạn gặp:');
            if (issue && issue.trim()) {
                await addDoc(collection(db, 'reports'), { userId: currentUser.uid, productId: product.id, productName: product.name, issue: issue.trim(), reportedAt: new Date() });
                showToast('Cảm ơn, admin sẽ xem xét!');
            }
        }
        function shareFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`, '_blank'); }
        function copyLink() { navigator.clipboard.writeText(location.href); showToast('Đã sao chép link'); }

        async function render() {
            const stats = await getStats();
            const isFav = await isFavorite();
            const imagesHtml = (product.demoImages || []).map(src => `<img src="${src}" alt="demo" loading="lazy">`).join('');
            el.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:16px;">
                    <h1>${escapeHtml(product.name)}</h1>
                    <div class="stats-mini" style="background:var(--bg-surface); padding:6px 16px; border-radius:40px;"><i class="fas fa-eye"></i> ${stats.views} &nbsp;|&nbsp; <i class="fas fa-download"></i> ${stats.downloads}</div>
                </div>
                <div class="slider-container">
                    <div class="demo-slider" id="demoSlider">${imagesHtml || '<p>Không có ảnh demo</p>'}</div>
                    <button class="slider-btn slider-left" id="slideLeft"><i class="fas fa-chevron-left"></i></button>
                    <button class="slider-btn slider-right" id="slideRight"><i class="fas fa-chevron-right"></i></button>
                </div>
                <p><strong>Mô tả:</strong> ${escapeHtml(product.description)}</p>
                <div class="error-box"><i class="fas fa-exclamation-triangle"></i> <strong>Lỗi thường gặp & khắc phục:</strong><br>${formatNotes(product.notes)}</div>
                <div class="action-buttons">
                    <button id="downloadBtn" class="btn download-btn"><i class="fas fa-download"></i> Tải code</button>
                    <button id="favBtn" class="btn favorite-btn ${isFav ? 'active' : ''}"><i class="${isFav ? 'fas' : 'far'} fa-heart"></i> ${isFav ? 'Đã thích' : 'Yêu thích'}</button>
                    <button id="shareBtn" class="btn share-btn"><i class="fab fa-facebook"></i> Chia sẻ</button>
                    <button id="copyBtn" class="btn share-btn"><i class="fas fa-link"></i> Copy link</button>
                    <button id="reportBtn" class="btn report-btn"><i class="fas fa-flag"></i> Báo lỗi</button>
                </div>
            `;
            document.getElementById('slideLeft').onclick = () => document.getElementById('demoSlider').scrollBy({ left: -300, behavior: 'smooth' });
            document.getElementById('slideRight').onclick = () => document.getElementById('demoSlider').scrollBy({ left: 300, behavior: 'smooth' });
            document.getElementById('downloadBtn').onclick = recordDownload;
            const favBtn = document.getElementById('favBtn');
            favBtn.onclick = () => toggleFavorite(favBtn);
            document.getElementById('shareBtn').onclick = shareFacebook;
            document.getElementById('copyBtn').onclick = copyLink;
            document.getElementById('reportBtn').onclick = reportIssue;
        }

        (async () => {
            if (!productId) { el.innerHTML = '<div style="text-align:center;">Thiếu ID sản phẩm.</div>'; return; }
            const ok = await fetchProduct();
            if (!ok) return;
            await incrementView();
            onAuthStateChanged(auth, async (user) => { currentUser = user; await render(); });
        })();
    </script>
</body>
</html>
