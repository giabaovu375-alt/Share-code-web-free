<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CodeHub - Chi tiết</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/product.css">
    <!-- Thẻ base giúp đường dẫn luôn đúng trên GitHub Pages -->
    <base href="/Share-code-web-free/">
</head>
<body>
    <div id="preloader"><div class="loader-spinner"></div></div>

    <header class="header">
        <div class="logo"><i class="fas fa-code"></i> Code<span style="color:#c4b5fd;">Hub</span></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </header>

    <main class="container">
        <div id="productContent">
            <div style="text-align:center;padding:60px;color:#8b8b9e;">
                <i class="fas fa-spinner fa-pulse fa-2x"></i><br>Đang tải...
            </div>
        </div>
    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img src="" alt="preview" id="lightboxImg">
    </div>

    <footer class="footer"><p>© 2025 CodeHub Premium</p></footer>
    <div id="toast" class="toast"></div>

    <!-- Chỉ còn file product-detail.js, không cần firebase-config.js -->
    <script src="js/product-detail.js"></script>
</body>
</html>
