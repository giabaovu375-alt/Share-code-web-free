<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Chi tiết code – CodeHub Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Slider ảnh demo */
        .demo-slider {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            padding: 16px 0;
            scroll-snap-type: x mandatory;
            scrollbar-width: thin;
        }
        .demo-slider img {
            max-width: 280px;
            width: auto;
            height: auto;
            border-radius: 20px;
            scroll-snap-align: start;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }
        .demo-slider img:hover {
            transform: scale(1.02);
        }
        /* Nút tải và yêu thích */
        .action-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 24px 0;
        }
        .download-btn {
            background: var(--accent);
            color: #000;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .download-btn:hover {
            background: var(--accent-dark);
            transform: scale(1.02);
        }
        .favorite-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: #ff6b6b;
            padding: 14px 32px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .favorite-btn.active {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }
        .favorite-btn i, .download-btn i {
            font-size: 1.2rem;
        }
        /* Error box */
        .error-box {
            background: #2a1a1a;
            border-left: 4px solid #ff6666;
            padding: 16px 20px;
            margin: 24px 0;
            border-radius: 16px;
        }
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }
        .stats-mini {
            background: var(--bg-surface);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .stats-mini i {
            margin-right: 6px;
        }
        @media (max-width: 600px) {
            .demo-slider img { max-width: 220px; }
            .action-buttons { flex-direction: column; }
            .download-btn, .favorite-btn { justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-code"></i> Code<span class="highlight">Hub</span> Pro</div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </header>
    <main class="container" style="max-width: 1000px; margin: 0 auto;">
        <div id="productContent">
            <div style="text-align: center; padding: 60px;">Đang tải thông tin code...</div>
        </div>
    </main>
    <footer class="footer">
        <p>© 2025 CodeHub Pro – Chia sẻ code chất lượng</p>
    </footer>

    <script type="module">
        import { 
            auth, db, doc, getDoc, setDoc, updateDoc, increment, 
            collection, addDoc, query, where, getDocs, deleteDoc,
            onAuthStateChanged
        } from './js/firebase-config.js';

        const productId = new URLSearchParams(window.location.search).get('id');
        if (!productId) {
            document.getElementById('productContent').innerHTML = '<p style="color:red;">Không có mã code.</p>';
        } else {
            let product = null;
            let currentUser = null;

            // Helper: thoát HTML
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // Lấy sản phẩm từ products.json
            async function fetchProduct() {
                const res = await fetch('data/products.json');
                const data = await res.json();
                product = data.find(p => p.id === productId);
                if (!product) {
                    document.getElementById('productContent').innerHTML = '<p style="color:red;">Không tìm thấy sản phẩm.</p>';
                    return false;
                }
                return true;
            }

            // Thống kê view
            async function incrementView() {
                const statRef = doc(db, 'stats', product.id);
                const statSnap = await getDoc(statRef);
                if (!statSnap.exists()) {
                    await setDoc(statRef, { views: 1, downloads: 0 });
                } else {
                    await updateDoc(statRef, { views: increment(1) });
                }
            }

            // Lấy stats
            async function getStats() {
                const statSnap = await getDoc(doc(db, 'stats', product.id));
                return statSnap.exists() ? statSnap.data() : { views: 0, downloads: 0 };
            }

            // Tăng downloads + lưu lịch sử
            async function recordDownload() {
                const statRef = doc(db, 'stats', product.id);
                await updateDoc(statRef, { downloads: increment(1) }).catch(() => setDoc(statRef, { views: 0, downloads: 1 }));
                if (currentUser) {
                    await addDoc(collection(db, 'download_history'), {
                        userId: currentUser.uid,
                        productId: product.id,
                        productName: product.name,
                        downloadLink: product.downloadLink,
                        downloadedAt: new Date()
                    });
                }
            }

            // Yêu thích
            async function isFavorite() {
                if (!currentUser) return false;
                const q = query(collection(db, 'favorites'), where('userId', '==', currentUser.uid), where('productId', '==', product.id));
                const snap = await getDocs(q);
                return !snap.empty;
            }
            async function addFavorite() {
                if (!currentUser) return;
                await addDoc(collection(db, 'favorites'), { userId: currentUser.uid, productId: product.id, favoritedAt: new Date() });
            }
            async function removeFavorite() {
                if (!currentUser) return;
                const q = query(collection(db, 'favorites'), where('userId', '==', currentUser.uid), where('productId', '==', product.id));
                const snap = await getDocs(q);
                snap.forEach(d => deleteDoc(d.ref));
            }

            // Render UI
            async function renderUI() {
                const stats = await getStats();
                const demoImagesHtml = (product.demoImages || []).map(src => `<img src="${src}" alt="demo" loading="lazy">`).join('');
                const isFav = await isFavorite();

                const html = `
                    <div class="product-header">
                        <h1>${escapeHtml(product.name)}</h1>
                        <div class="stats-mini">
                            <i class="fas fa-eye"></i> ${stats.views} &nbsp;|&nbsp;
                            <i class="fas fa-download"></i> ${stats.downloads}
                        </div>
                    </div>
                    <div class="demo-slider">
                        ${demoImagesHtml || '<p>Chưa có ảnh demo</p>'}
                    </div>
                    <div class="product-description">
                        <p><strong>Mô tả:</strong> ${escapeHtml(product.description)}</p>
                    </div>
                    <div class="error-box">
                        <i class="fas fa-exclamation-triangle"></i> <strong>Lỗi thường gặp & cách khắc phục:</strong><br>
                        ${(product.notes || 'Không có ghi chú.').replace(/\n/g, '<br>')}
                    </div>
                    <div class="action-buttons">
                        <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> Tải code ngay</button>
                        <button id="favoriteBtn" class="favorite-btn ${isFav ? 'active' : ''}">
                            <i class="${isFav ? 'fas' : 'far'} fa-heart"></i> ${isFav ? 'Đã yêu thích' : 'Yêu thích'}
                        </button>
                    </div>
                `;
                document.getElementById('productContent').innerHTML = html;

                // Nút tải
                document.getElementById('downloadBtn').onclick = async () => {
                    await recordDownload();
                    window.open(product.downloadLink, '_blank');
                    alert('Đã chuyển đến link tải. Cảm ơn bạn!');
                };
                // Nút yêu thích
                const favBtn = document.getElementById('favoriteBtn');
                favBtn.onclick = async () => {
                    if (!currentUser) {
                        alert('Vui lòng đăng nhập để sử dụng tính năng yêu thích.');
                        return;
                    }
                    const currentlyFav = await isFavorite();
                    if (currentlyFav) {
                        await removeFavorite();
                        favBtn.innerHTML = '<i class="far fa-heart"></i> Yêu thích';
                        favBtn.classList.remove('active');
                    } else {
                        await addFavorite();
                        favBtn.innerHTML = '<i class="fas fa-heart"></i> Đã yêu thích';
                        favBtn.classList.add('active');
                    }
                };
            }

            // Khởi chạy
            (async function init() {
                const ok = await fetchProduct();
                if (!ok) return;
                await incrementView();
                onAuthStateChanged(auth, async (user) => {
                    currentUser = user;
                    await renderUI();
                });
            })();
        }
    </script>
</body>
</html>
