<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết code – CodeHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .demo-slider { display: flex; overflow-x: auto; gap: 12px; padding: 16px 0; scroll-snap-type: x mandatory; }
        .demo-slider img { max-width: 280px; border-radius: 16px; border: 1px solid var(--border); }
        .download-btn { background: var(--accent); color: #000; padding: 12px 28px; border-radius: 40px; font-weight: bold; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; }
        .favorite-btn { background: var(--bg-card); border: 1px solid var(--border); color: #ff6b6b; padding: 12px 20px; border-radius: 40px; cursor: pointer; margin-left: 16px; }
        .favorite-btn.active { background: #ff6b6b; color: white; border-color: #ff6b6b; }
        .error-box { background: #2a1a1a; border-left: 4px solid #ff6666; padding: 16px; margin: 20px 0; border-radius: 12px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-code"></i> Code<span class="highlight">Hub</span></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </header>
    <main id="productDetail" style="max-width:1000px;margin:0 auto;padding:20px;"></main>
    <footer class="footer"><p>© 2025 CodeHub – Chia sẻ code miễn phí</p></footer>
    <script type="module">
        import { auth, db, doc, getDoc, updateDoc, increment, onAuthStateChanged, addDoc, collection, query, where, getDocs, deleteDoc, setDoc } from './js/firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let product = null;
        let currentUser = null;

        async function loadProduct() {
            const res = await fetch('data/products.json');
            const products = await res.json();
            product = products.find(p => p.id === productId);
            if (!product) { document.getElementById('productDetail').innerHTML = '<p>Không tìm thấy sản phẩm</p>'; return; }
            await incrementView(product.id);
            renderProduct();
            if (currentUser) updateFavButton(await isFavorite(product.id, currentUser.uid));
        }
        async function incrementView(id) {
            const ref = doc(db, 'stats', id);
            await updateDoc(ref, { views: increment(1) }).catch(() => setDoc(ref, { views: 1, downloads: 0 }));
        }
        async function incrementDownload(id) {
            const ref = doc(db, 'stats', id);
            await updateDoc(ref, { downloads: increment(1) }).catch(() => setDoc(ref, { views: 0, downloads: 1 }));
        }
        async function isFavorite(pid, uid) {
            if (!uid) return false;
            const q = query(collection(db, 'favorites'), where('userId', '==', uid), where('productId', '==', pid));
            const snap = await getDocs(q);
            return !snap.empty;
        }
        async function addFavorite(pid, uid) { await addDoc(collection(db, 'favorites'), { userId: uid, productId: pid, favoritedAt: new Date() }); }
        async function removeFavorite(pid, uid) {
            const q = query(collection(db, 'favorites'), where('userId', '==', uid), where('productId', '==', pid));
            const snap = await getDocs(q);
            snap.forEach(d => deleteDoc(d.ref));
        }
        let favBtn;
        function updateFavButton(isFav) {
            if (favBtn) {
                favBtn.innerHTML = isFav ? '<i class="fas fa-heart"></i> Đã yêu thích' : '<i class="far fa-heart"></i> Yêu thích';
                if (isFav) favBtn.classList.add('active'); else favBtn.classList.remove('active');
            }
        }
        async function renderProduct() {
            const stats = await getDoc(doc(db, 'stats', product.id)).then(s => s.exists() ? s.data() : { views: 0, downloads: 0 });
            const demoHtml = (product.demoImages || []).map(src => `<img src="${src}">`).join('');
            document.getElementById('productDetail').innerHTML = `
                <h1>${product.name}</h1>
                <div class="demo-slider">${demoHtml || '<p>Không có ảnh demo</p>'}</div>
                <p><strong>Mô tả:</strong> ${product.description}</p>
                <div class="error-box"><i class="fas fa-exclamation-triangle"></i> <strong>Lỗi thường gặp:</strong><br>${(product.notes || '').replace(/\n/g,'<br>')}</div>
                <div>
                    <button id="downloadBtn" class="download-btn"><i class="fas fa-download"></i> Tải code</button>
                    <button id="favBtn" class="favorite-btn"><i class="far fa-heart"></i> Yêu thích</button>
                </div>
            `;
            document.getElementById('downloadBtn').onclick = async () => {
                await incrementDownload(product.id);
                if (currentUser) await addDoc(collection(db, 'download_history'), { userId: currentUser.uid, productId: product.id, productName: product.name, downloadLink: product.downloadLink, downloadedAt: new Date() });
                window.open(product.downloadLink, '_blank');
            };
            favBtn = document.getElementById('favBtn');
            favBtn.onclick = async () => {
                if (!currentUser) return alert('Đăng nhập để yêu thích');
                const isFav = await isFavorite(product.id, currentUser.uid);
                if (isFav) { await removeFavorite(product.id, currentUser.uid); updateFavButton(false); }
                else { await addFavorite(product.id, currentUser.uid); updateFavButton(true); }
            };
        }
        onAuthStateChanged(auth, async (user) => { currentUser = user; await loadProduct(); });
    </script>
</body>
</html>
