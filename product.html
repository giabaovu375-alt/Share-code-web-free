<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết code – CodeHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .demo-slider {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 16px 0;
            scroll-snap-type: x mandatory;
        }
        .demo-slider img {
            max-width: 280px;
            border-radius: 16px;
            scroll-snap-align: start;
            border: 1px solid var(--border);
        }
        .download-btn {
            background: var(--accent);
            color: #000;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .download-btn:hover { background: var(--accent-dark); transform: scale(1.02); }
        .error-box {
            background: #2a1a1a;
            border-left: 4px solid #ff6666;
            padding: 16px;
            margin: 20px 0;
            border-radius: 12px;
        }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--accent); text-decoration: none; }
        .product-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        #productDetail { max-width: 1000px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-code"></i> Code<span class="highlight">Hub</span></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </header>
    <main id="productDetail"></main>
    <footer class="footer"><p>© 2025 CodeHub – Chia sẻ code miễn phí</p></footer>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
