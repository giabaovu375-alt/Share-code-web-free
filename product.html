<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CodeHub Premium • Chi tiết code</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ========== PREMIUM RESET & VARIABLES ========== */
        :root {
            --bg: #0a0a0f;
            --bg-card: #111118;
            --bg-surface: #16161f;
            --border: #23232e;
            --text: #e4e4ed;
            --text-muted: #8b8b9e;
            --accent: #a78bfa;
            --accent-strong: #c4b5fd;
            --danger: #f87171;
            --success: #34d399;
            --star: #fbbf24;
            --gradient-1: linear-gradient(145deg, #a78bfa 0%, #818cf8 100%);
            --gradient-2: linear-gradient(145deg, #f472b6 0%, #fb923c 100%);
            --glass-bg: rgba(18, 18, 26, 0.65);
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Scrollbar Premium */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 12px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3d3d55;
        }

        /* ========== PAGE LOADER ========== */
        #preloader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-spinner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== HEADER PREMIUM ========== */
        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo i {
            background: none;
            -webkit-text-fill-color: #a78bfa;
            margin-right: 6px;
        }
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            transition: var(--transition);
            font-size: 0.9rem;
        }
        .back-link:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* ========== MAIN CONTAINER ========== */
        .container {
            max-width: 1050px;
            margin: 0 auto;
            padding: 32px 24px 50px;
            flex: 1;
            width: 100%;
        }

        /* ========== CARD PREMIUM ========== */
        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 32px 28px;
            box-shadow: var(--shadow-xl);
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }
        .product-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stats-badge {
            background: var(--bg-surface);
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .stats-badge i {
            color: var(--accent);
        }

        /* ========== IMAGE SLIDER PREMIUM ========== */
        .slider-wrapper {
            position: relative;
            margin: 28px 0 32px;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 8px;
            border: 1px solid var(--border);
        }
        .demo-slider {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            gap: 16px;
            padding: 8px 4px;
            scroll-snap-type: x mandatory;
            border-radius: 16px;
        }
        .demo-slider img {
            height: 240px;
            width: auto;
            max-width: 320px;
            border-radius: var(--radius-md);
            scroll-snap-align: start;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s;
        }
        .demo-slider img:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 30px -12px rgba(167, 139, 250, 0.25);
            border-color: var(--accent);
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.1rem;
            transition: var(--transition);
            z-index: 5;
        }
        .slider-btn:hover {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
        }
        .slider-left {
            left: -6px;
        }
        .slider-right {
            right: -6px;
        }
        .no-image {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            width: 100%;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(167, 139, 250, 0.4);
            transform: scale(0.9);
            transition: 0.3s;
        }
        .lightbox.active img {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
        }

        /* ========== DESCRIPTION ========== */
        .desc-block {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            margin: 24px 0;
            font-size: 1rem;
            border: 1px solid var(--border);
            color: #d1d5db;
        }

        /* ========== ISSUES ACCORDION PREMIUM ========== */
        .accordion {
            background: #1e1120;
            border-left: 4px solid #f472b6;
            border-radius: var(--radius-md);
            margin: 24px 0;
            overflow: hidden;
            transition: var(--transition);
        }
        .accordion-header {
            padding: 16px 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
        }
        .accordion-content {
            padding: 0 22px 18px;
            color: #e5e7eb;
            font-size: 0.95rem;
            display: none;
        }
        .accordion.open .accordion-content {
            display: block;
        }

        /* ========== BUTTONS PREMIUM ========== */
        .action-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 28px 0 8px;
        }
        .btn {
            padding: 14px 26px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            transition: all 0.25s ease;
            letter-spacing: 0.2px;
            background: var(--bg-surface);
            color: white;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(0, 0, 0, 0.6);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--gradient-1);
            color: #0a0a0f;
            border: none;
            font-weight: 700;
        }
        .btn-fav {
            color: #fb7185;
        }
        .btn-fav.active {
            background: #fb7185;
            color: white;
            border-color: #fb7185;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Rating */
        .rating-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0 16px;
            color: var(--star);
        }
        .rating-box i {
            cursor: pointer;
            font-size: 1.4rem;
            transition: 0.2s;
        }
        .rating-box i:hover {
            transform: scale(1.2);
        }

        /* ========== TOAST PREMIUM ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a28;
            backdrop-filter: blur(25px);
            border: 1px solid var(--accent);
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            opacity: 0;
            transition: 0.3s ease;
            pointer-events: none;
            z-index: 1500;
            box-shadow: 0 15px 35px rgba(167, 139, 250, 0.2);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 28px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .product-title {
                font-size: 1.6rem;
            }
            .demo-slider img {
                height: 180px;
                max-width: 240px;
            }
            .btn {
                padding: 12px 20px;
                font-size: 0.85rem;
            }
            .header {
                padding: 14px 18px;
            }
        }
    </style>
</head>
<body>

    <!-- PRELOADER -->
    <div id="preloader"><div class="loader-spinner"></div></div>

    <!-- HEADER -->
    <header class="header">
        <div class="logo"><i class="fas fa-code"></i> Code<span style="color:#c4b5fd;">Hub</span></div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại</a>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
        <div id="productContent">
            <div style="text-align:center; padding:60px; color:var(--text-muted);">
                <i class="fas fa-spinner fa-pulse fa-2x"></i><br>Đang tải dữ liệu...
            </div>
        </div>
    </main>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img src="" alt="preview" id="lightboxImg">
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2025 CodeHub Premium · Thiết kế bởi cộng đồng lập trình viên</p>
    </footer>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <!-- Firebase SDK & Config (giữ nguyên file gốc của bạn) -->
    <script type="module" src="js/firebase-config.js"></script>

    <script type="module">
        import { auth, db, doc, getDoc, setDoc, updateDoc, increment, collection, addDoc, query, where, getDocs, deleteDoc, onAuthStateChanged } from './js/firebase-config.js';

        // ---------- DOM REFS ----------
        const el = document.getElementById('productContent');
        const toast = document.getElementById('toast');
        const preloader = document.getElementById('preloader');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const productId = new URLSearchParams(location.search).get('id');
        let product = null,
            currentUser = null;

        // ---------- UTILS ----------
        function showToast(msg, isErr = false) {
            toast.textContent = msg;
            toast.style.borderColor = isErr ? '#f87171' : 'var(--accent)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2700);
        }

        function escapeHtml(str) {
            return str ? str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]) : '';
        }

        function formatNotes(notes) {
            return escapeHtml(notes || 'Không có ghi chú.').replace(/\n/g, '<br>');
        }

        // ---------- FETCH PRODUCT ----------
        async function fetchProduct() {
            try {
                const res = await fetch('data/products.json');
                if (!res.ok) throw new Error('Network');
                const data = await res.json();
                product = data.find(p => p.id === productId);
                if (!product) throw new Error('Not found');
                return true;
            } catch {
                el.innerHTML = `<div style="text-align:center;padding:60px;color:#f87171;"><i class="fas fa-exclamation-circle"></i> Không tìm thấy sản phẩm.</div>`;
                return false;
            }
        }

        // ---------- STATS & FAVS ----------
        async function incrementView() {
            const ref = doc(db, 'stats', product.id);
            try { await updateDoc(ref, { views: increment(1) }); } catch { await setDoc(ref, { views: 1, downloads: 0 }); }
        }
        async function getStats() {
            try {
                const snap = await getDoc(doc(db, 'stats', product.id));
                return snap.exists() ? snap.data() : { views: 0, downloads: 0 };
            } catch { return { views: 0, downloads: 0 }; }
        }
        async function isFavorite() {
            if (!currentUser) return false;
            const q = query(collection(db, 'favorites'), where('userId', '==', currentUser.uid), where('productId', '==',
                product.id));
            return !(await getDocs(q)).empty;
        }
        async function toggleFavorite(btn) {
            if (!currentUser) return showToast('🔐 Đăng nhập để yêu thích', true);
            const fav = await isFavorite();
            const q = query(collection(db, 'favorites'), where('userId', '==', currentUser.uid), where('productId', '==',
                product.id));
            const snap = await getDocs(q);
            if (fav) {
                snap.forEach(d => deleteDoc(d.ref));
                btn.classList.remove('active');
                btn.innerHTML = '<i class="far fa-heart"></i> Yêu thích';
                showToast('💔 Đã xóa yêu thích');
            } else {
                await addDoc(collection(db, 'favorites'), { userId: currentUser.uid, productId: product.id,
                    favoritedAt: new Date() });
                btn.classList.add('active');
                btn.innerHTML = '<i class="fas fa-heart"></i> Đã thích';
                showToast('❤️ Đã thêm vào yêu thích');
            }
        }

        // ---------- DOWNLOAD & REPORT ----------
        async function recordDownload() {
            const ref = doc(db, 'stats', product.id);
            await updateDoc(ref, { downloads: increment(1) }).catch(() => setDoc(ref, { views: 0, downloads: 1 }));
            if (currentUser)
                await addDoc(collection(db, 'download_history'), { userId: currentUser.uid, productId: product.id,
                    productName: product.name, downloadedAt: new Date() });
            showToast('🚀 Đang chuyển đến Mediafire...');
            setTimeout(() => window.open(product.downloadLink, '_blank'), 400);
        }
        async function reportIssue() {
            if (!currentUser) return showToast('Vui lòng đăng nhập để báo lỗi', true);
            const issue = prompt('📝 Mô tả lỗi bạn gặp phải:');
            if (issue && issue.trim()) {
                await addDoc(collection(db, 'reports'), { userId: currentUser.uid, productId: product.id, productName: product
                        .name, issue: issue.trim(), reportedAt: new Date() });
                showToast('✅ Đã gửi báo cáo, cảm ơn bạn!');
            }
        }

    // ---------- SHARE & COPY ----------
function shareFacebook() {
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(location.href)}`, '_blank');
}

function copyLink() {
    navigator.clipboard.writeText(location.href);
    showToast('📋 Đã sao chép liên kết');
}

        // ---------- LIGHTBOX ----------
function openLightbox(src) {
    lightboxImg.src = src;
    lightbox.classList.add('active');
}
document.querySelector('.lightbox-close').addEventListener('click', () => lightbox.classList.remove('active'));
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('active'); });

// ---------- RENDER PREMIUM ----------
async function renderProduct() {
    const stats = await getStats();
    const fav = await isFavorite();
    const images = product.demoImages || [];

    const imagesHtml = images.length ? images.map(src =>
        `<img src="${src}" alt="demo" loading="lazy" onclick="document.querySelector('#lightbox').classList.add('active'); document.querySelector('#lightboxImg').src='${src}';">`
    ).join('') : '<div class="no-image"><i class="far fa-image fa-2x"></i><br>Không có ảnh demo</div>';

    el.innerHTML = `
    <div class="product-card">
      <div class="product-header">
        <h1 class="product-title">${escapeHtml(product.name)}</h1>
        <div class="stats-badge">
          <span><i class="fas fa-eye"></i> ${stats.views}</span>
          <span><i class="fas fa-download"></i> ${stats.downloads}</span>
          ${product.version ? `<span><i class="fas fa-code-branch"></i> v${escapeHtml(product.version)}</span>` : ''}
        </div>
      </div>

      <div class="slider-wrapper">
        <div class="demo-slider" id="demoSlider">${imagesHtml}</div>
        ${images.length > 1 ? `
        <button class="slider-btn slider-left" id="slideLeft"><i class="fas fa-chevron-left"></i></button>
        <button class="slider-btn slider-right" id="slideRight"><i class="fas fa-chevron-right"></i></button>` : ''}
      </div>

      <div class="desc-block">
        <strong style="color:#c4b5fd;">📖 Mô tả:</strong><br>${escapeHtml(product.description)}
        ${product.author ? `<br><small style="color:#8b8b9e;">👤 Tác giả: ${escapeHtml(product.author)}</small>` : ''}
      </div>

      <div class="accordion" id="issueAccordion">
        <div class="accordion-header" id="accordionToggle">
          <i class="fas fa-bug" style="color:#f472b6;"></i> Lỗi thường gặp & Cách khắc phục
          <i class="fas fa-chevron-down" style="margin-left:auto;transition:0.3s;"></i>
        </div>
        <div class="accordion-content">${formatNotes(product.notes)}</div>
      </div>

      <div class="rating-box">
        <span style="color:#e4e4ed; margin-right:6px;">Đánh giá:</span>
        ${[1,2,3,4,5].map(i => `<i class="fas fa-star" data-star="${i}"></i>`).join('')}
        <span style="color:#a78bfa; margin-left:6px; font-weight:600;">4.8</span>
      </div>

      <div class="action-grid">
        <button id="downloadBtn" class="btn btn-primary"><i class="fas fa-download"></i> Tải code</button>
        <button id="favBtn" class="btn btn-fav ${fav ? 'active' : ''}"><i class="${fav ? 'fas' : 'far'} fa-heart"></i> ${fav ? 'Đã thích' : 'Yêu thích'}</button>
        <button id="shareBtn" class="btn btn-outline"><i class="fab fa-facebook"></i> Chia sẻ</button>
        <button id="copyBtn" class="btn btn-outline"><i class="fas fa-link"></i> Copy</button>
        <button id="reportBtn" class="btn btn-outline"><i class="fas fa-flag"></i> Báo lỗi</button>
      </div>
    </div>
  `;

    // Slider buttons
    const slider = document.getElementById('demoSlider');
    document.getElementById('slideLeft')?.addEventListener('click', () => slider.scrollBy({ left: -320, behavior: 'smooth' }));
    document.getElementById('slideRight')?.addEventListener('click', () => slider.scrollBy({ left: 320, behavior: 'smooth' }));

    // Accordion
    const accordion = document.getElementById('issueAccordion');
    document.getElementById('accordionToggle').addEventListener('click', () => {
        accordion.classList.toggle('open');
        const icon = accordion.querySelector('.fa-chevron-down');
        if (icon) icon.style.transform = accordion.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0)';
    });
    if (product.notes && product.notes.trim() && product.notes !== 'Không có ghi chú.') {
        accordion.classList.add('open');
    }

    // Rating interaction
    document.querySelectorAll('.rating-box i').forEach(star => {
        star.addEventListener('click', function() {
            const val = this.dataset.star;
            document.querySelectorAll('.rating-box i').forEach((s, idx) => {
                s.style.color = idx < val ? '#fbbf24' : '#4b5563';
            });
            showToast(`⭐ Cảm ơn bạn đã đánh giá ${val} sao!`);
        });
    });

    // Bind các nút hành động
    document.getElementById('downloadBtn').onclick = recordDownload;
    document.getElementById('favBtn').onclick = () => toggleFavorite(document.getElementById('favBtn'));
    document.getElementById('shareBtn').onclick = shareFacebook;
    document.getElementById('copyBtn').onclick = copyLink;
    document.getElementById('reportBtn').onclick = reportIssue;

    // Ẩn preloader
    setTimeout(() => preloader.classList.add('hidden'), 300);
}

// ---------- INIT ----------
(async () => {
    if (!productId) {
        el.innerHTML = '<div style="text-align:center;padding:60px;">Thiếu ID sản phẩm.</div>';
        preloader.classList.add('hidden');
        return;
    }
    const ok = await fetchProduct();
    if (!ok) {
        preloader.classList.add('hidden');
        return;
    }
    await incrementView();
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        await renderProduct();
    });
})();
