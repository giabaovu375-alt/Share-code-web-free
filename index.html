<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CodeHub – Kho code miễn phí</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo"><i class="fas fa-code"></i> Code<span class="highlight">Hub</span></div>
        <div class="user-actions" id="userActions">
            <button id="showAuthBtn" class="btn-login"><i class="fas fa-user-plus"></i> Đăng nhập / Đăng ký</button>
            <div id="userInfo" class="user-info hidden">
                <img id="userAvatar" src="https://via.placeholder.com/32" alt="avatar">
                <span id="userName"></span>
                <a href="history.html" id="historyLink" class="history-link"><i class="fas fa-history"></i></a>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <div class="filter-bar">
        <button id="menuToggle" class="menu-btn"><i class="fas fa-bars"></i> Danh mục</button>
        <div id="categoryMenu" class="category-menu hidden">
            <button data-cat="all" class="cat-active">Tất cả</button>
            <button data-cat="web-game">🎮 Code web game</button>
            <button data-cat="web-shop">🛒 Code web shop</button>
            <button data-cat="web-film">🎬 Code web phim</button>
            <button data-cat="other">📦 Khác</button>
        </div>
        <div class="stats-badge">
            <i class="fas fa-chart-line"></i> <span id="totalStats">0 lượt xem / 0 tải</span>
        </div>
    </div>

    <section class="hero">
        <h1><i class="fas fa-download"></i> Tải code miễn phí</h1>
        <p>Hàng trăm source code chất lượng, cập nhật liên tục</p>
    </section>

    <main class="container">
        <h2 class="section-title"><i class="fas fa-fire"></i> Code nổi bật</h2>
        <div id="productsGrid" class="products-grid"></div>
    </main>

    <div id="authModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="loginForm">
                <h3>Đăng nhập</h3>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPass" placeholder="Mật khẩu" required>
                <button id="doLoginBtn" class="btn-login">Đăng nhập</button>
                <p>Chưa có tài khoản? <a href="#" id="switchToRegister">Đăng ký ngay</a></p>
            </div>
            <div id="registerForm" class="hidden">
                <h3>Đăng ký</h3>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPass" placeholder="Mật khẩu" required>
                <button id="doRegisterBtn" class="btn-login">Đăng ký</button>
                <p>Đã có tài khoản? <a href="#" id="switchToLogin">Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2025 CodeHub – Chia sẻ code miễn phí. Mọi source code chỉ mang tính tham khảo.</p>
    </footer>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
