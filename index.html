<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeHub - Kho Code Miễn Phí</title>
    <base href="/Share-code-web-free/">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="app-loading" class="app-loader">
        <div class="spinner"></div>
        <p>Đang khởi tạo ứng dụng...</p>
    </div>

    <div id="app" style="display:none;">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <i class="fas fa-code"></i> Code<span>Hub</span>
                </a>
            </div>
            <nav class="header-nav">
                <a href="index.html" class="nav-link active">Trang chủ</a>
                <a href="#" class="nav-link">Khám phá</a>
                <a href="#" class="nav-link">Bảng xếp hạng</a>
            </nav>
            <div class="header-right" id="authContainer"></div>
        </header>

        <div class="filter-bar">
            <div class="filter-left">
                <button class="filter-btn active" data-cat="all">Tất cả</button>
                <button class="filter-btn" data-cat="web-film">🎬 Web phim</button>
                <button class="filter-btn" data-cat="web-game">🎮 Web game</button>
                <button class="filter-btn" data-cat="web-shop">🛒 Web shop</button>
                <button class="filter-btn" data-cat="other">📦 Khác</button>
            </div>
            <div class="filter-right">
                <span class="stats-global" id="globalStats">
                    <i class="fas fa-chart-line"></i> Đang tải...
                </span>
            </div>
        </div>

        <main class="container" id="mainContent"></main>

        <footer class="footer">
            <p>© 2025 CodeHub. Mã nguồn được chia sẻ bởi cộng đồng.</p>
        </footer>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>>
